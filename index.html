<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rádio-América | Live Stream</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="css/style.css">
    <!-- Google Fonts para um visual limpo -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.1);
            --blur: blur(15px);
        }
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #fff;
            font-family: 'Inter', sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        /* Container para o Layout Orbital */
        #app-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        .glass-card {
            background: var(--glass);
            backdrop-filter: var(--blur);
            -webkit-backdrop-filter: var(--blur);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 20px;
            width: 90%;
            max-width: 400px;
            text-align: center;
        }
    </style>
</head>
<body>

    <div id="app-container">
        <div class="glass-card">
            <h1 id="station-name">Rádio América</h1>
            <p id="station-location">Brasil & América Latina</p>
            
            <!-- Onde o Player Orbital será montado -->
            <div id="orbital-nav"></div>

            <audio id="main-player" controls style="display:none;"></audio>
            
            <div id="controls">
                <button id="btn-play" class="glass-button">Sintonizar</button>
            </div>
        </div>
    </div>

    <script type="module" src="js/main.js"></script>
    <script>
        // Registro do Service Worker para funcionar Offline
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js')
                .then(() => console.log("Rádio América: Pronto para uso Offline"));
        }
    </script>
</body>
</html>
